    <style>
      body {
        margin: 0;
        font-family: "Rubik", sans-serif;
        color: #212021;
      }
      .topnav {
        overflow: hidden;
        /*background-color: #212021;*/
        border-bottom: 1.5px dashed #212021;
      }
      .topnav a {
        float: left;
        display: block;
        color: #212021;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        font-size: 14px;
        border-radius: 4px;
      }
      .topnav a:hover {
        background-color: #cf8c6a;
        color: #212021;
      }

      .topnav a.active {
        background-color: #d6dec8;
        color: #212021;
      }

      .topnav .icon {
        display: none;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      @media screen and (max-width: 600px) {
        .topnav a:not(:first-child) {
          display: none;
        }
        .topnav a.icon {
          float: right;
          display: block;
        }
      }

      @media screen and (max-width: 600px) {
        .topnav.responsive {
          position: relative;
        }
        .topnav.responsive .icon {
          position: absolute;
          right: 4px;
          top: 4px;
        }
        .topnav.responsive a {
          float: none;
          display: block;
          text-align: left;
        }
      }
      a:hover {
        text-decoration: underline;
        color: #212021;
      }
      a {
        color: #212021;
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px 60px;
      }
      .blogclass{
        margin: 20px 60px;
      }
      @media only screen and (max-width: 600px) {
        .container {
          margin: 10px;
          justify-content: left;
        }
        .blogclass{
          margin: 10px;
        }
      }
    </style>
  </head>
  <body>

          </div>

    <script>
      function myFunction() {
        var x = document.getElementById("myTopnav");
        if (x.className === "topnav") {
          x.className += " responsive";
        } else {
          x.className = "topnav";
        }
      }
    </script>
  </body>

<!DOCTYPE html>
<html>
  <head>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
      <title>Wonjong "Peter" Lee</title>
      <style>
          body {
          margin:0;
          font-family: 'Rubik', sans-serif;
          }
          .topnav{
              overflow:hidden;
              /*background-color: #212021;*/
              border-bottom: 1.5px solid #212021;
          }
          .topnav a{
              float:left;
              display:block;
              color:#212021;
              text-align:center;
              padding:14px 16px;
              text-decoration:none;
              font-size:14px;
              border-radius: 4px;
          }
          .topnav a:hover {
          background-color: #CF8C6A;
          color: #212021;
          }

          .topnav a.active {
            background-color: #d6dec8;
            color: #212021;
          }

          .topnav .icon {
            display: none;
          }
          * {
              margin:0;
              padding:0;
              box-sizing:border-box
            }
            .prof_description {
              width:100%;
            }
            .image {
              height:0;
              padding-bottom:40%;
              background-repeat:no-repeat;
              background-size:cover;
              background-position:center center;
              position:relative;
              width:40%;
            }
            .desc, .image {
              float:left;
              display:block
            }
            .desc {
              width:60%;
              text-align: justify;
              padding:20px;
            }
            @media (max-width:600px) {
            .desc{
              float:none;
              width:100%;
              text-align:center;
            }
            .image {
              float:none;
              width:100%;
              max-width: 100%;
              height: 500px;
            }
          }
          @media screen and (max-width: 600px) {
            .topnav a:not(:first-child) {display: none;}
            .topnav a.icon {
              float: right;
              display: block;
            }
          }

          @media screen and (max-width: 600px) {
            .topnav.responsive {position: relative;}
            .topnav.responsive .icon {
              position: absolute;
              right: 4px;
              top: 4px;
            }
            .topnav.responsive a {
              float: none;
              display: block;
              text-align: left;
            }
          }
      </style>
  </head>
  <body>

  <div class="topnav" id="myTopnav" style="padding:4px;">
    <a href="index.html" title="Me sleeping at ECEB during finals"><img style="vertical-align:middle" src="assets/images/favicon2.gif" alt="icon" height = 14px;></a>
    <a href="blog.html" >Blog</a>
    <a href="projects.html">Projects</a>
    <a href="resume.html"class="active">Resume</a>
    <a href="contact.html">Contact</a>
    <a href="javascript:void(0);" class="icon" onclick="myFunction()">
      <i class="fa fa-bars"></i>
    </a>
  </div>

  <script>
  function myFunction() {
    var x = document.getElementById("myTopnav");
    if (x.className === "topnav") {
      x.className += " responsive";
    } else {
      x.className = "topnav";
    }
  }
  </script>

  </body>
</html>
